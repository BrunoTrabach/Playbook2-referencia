<script>
function atualizaHora(){
  try{
    const hora = new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'}).format(new Date());
    document.getElementById('hora').textContent = hora;
  }catch(e){document.getElementById('hora').textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
}
atualizaHora(); setInterval(atualizaHora,60000);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script></body></html>
