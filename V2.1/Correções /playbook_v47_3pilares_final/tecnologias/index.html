<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Tecnologias</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:#f8f9fa}.card{background:white;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05);border:1px solid #f0f0f0}.tab-active{background:#E30613;color:white}.accordion-content{max-height:0;overflow:hidden;transition:max-height .3s}.accordion-open .accordion-content{max-height:500px;padding-top:.75rem;padding-bottom:1rem}.accordion-open .chevron{transform:rotate(180deg)}</style></head><body>
<header class="sticky top-0 z-40 bg-[#E30613]"><div class="max-w-6xl mx-auto px-4"><div class="flex items-center h-14 gap-3"><a href="../index.html" class="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></a><div class="flex-1"><h1 class="text-white font-semibold text-[17px]">Tecnologias e Recursos</h1><p class="text-white/80 text-xs -mt-0.5">Boomboxes 2025-2026</p></div></div></div></header>
<main class="max-w-6xl mx-auto px-4 py-5"><div class="card p-4 mb-4"><input id="search" placeholder="Filtrar por palavra-chave..." class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#E30613]/20"></div><div id="tabs" class="flex gap-2 overflow-x-auto pb-2 mb-4"></div><div id="content"></div></main>
<script>
const data = {"modelos":[
{"id":"aiwa","nome":"AIWA BBS-01","overview":{"Potência":"200W RMS","Bateria":"Até 30h","Proteção":"IP66","Bluetooth":"5.3","Diferencial":"Energy Saving"},"tecnologias":[{"nome":"Energy Saving","desc":"Mantém 200W na bateria","beneficio":"Não perde potência","diferencial":"JBL perde 25%"},{"nome":"Bluetooth 5.3","desc":"Conexão estável","beneficio":"Menos quedas","diferencial":"Igual JBL"},{"nome":"IP66","desc":"Jatos d'água","beneficio":"Praia/piscina","diferencial":"Inferior a IP67"},{"nome":"App Aiwa BR Audio","desc":"EQ, BOOST, RGB","beneficio":"Controle total","diferencial":"BOOST exclusivo"},{"nome":"BOOST Graves","desc":"Reforço digital","beneficio":"Funk mais pesado","diferencial":"Só Aiwa tem"},{"nome":"Power Bank","desc":"USB 5V/2A","beneficio":"Carrega celular","diferencial":"Igual JBL"},{"nome":"TWS","desc":"2 caixas","beneficio":"400W estéreo","diferencial":"Só 2 unidades"},{"nome":"3 Vias 3 Amps","desc":"1 amp por faixa","beneficio":"Som equilibrado","diferencial":"Melhor que 1 amp"}]},
{"id":"jbl","nome":"JBL BOOMBOX 3","overview":{"Potência":"180W/136W","Bateria":"Até 24h","Proteção":"IP67","Bluetooth":"5.3","Diferencial":"Pro Sound"},"tecnologias":[{"nome":"JBL Pro Sound","desc":"Assinatura de estúdio","beneficio":"Som equilibrado","diferencial":"80 anos história"},{"nome":"IP67","desc":"Imersão 1m/30min","beneficio":"Máxima proteção","diferencial":"Superior"},{"nome":"PartyBoost","desc":"Conecta várias","beneficio":"Som para festa grande","diferencial":"Mais que 2"},{"nome":"Bateria 24h","desc":"10.000mAh","beneficio":"Dia inteiro","diferencial":"Real 15-20h"}]},
{"id":"lg","nome":"LG XG9S","overview":{"Potência":"120W","Bateria":"Até 24h","Proteção":"IP67","Bluetooth":"5.1","Diferencial":"Meridian Audio"},"tecnologias":[{"nome":"Meridian Audio","desc":"Áudio de luxo","beneficio":"Alta fidelidade","diferencial":"Usado em Jaguar"},{"nome":"2 Woofers Carbono","desc":"Fibra de carbono","beneficio":"Graves rápidos","diferencial":"Material F1"},{"nome":"Projetor de Luz","desc":"Globo que projeta","beneficio":"Balada real","diferencial":"Exclusivo"},{"nome":"16M Cores RGB","desc":"RGB completo","beneficio":"Qualquer cor","diferencial":"Vs 6 da Aiwa"}]},
{"id":"philco","nome":"PHILCO PBX01","overview":{"Potência":"300W nominal","Bateria":"Até 30h","Proteção":"IP66","Bluetooth":"5.4","Diferencial":"Preço baixo"},"tecnologias":[{"nome":"Bluetooth 5.4","desc":"Mais recente","beneficio":"30% economia","diferencial":"Superior"},{"nome":"ExBass","desc":"Reforço graves","beneficio":"Graves fortes","diferencial":"Ajustável"},{"nome":"300W","desc":"Potência anunciada","beneficio":"Volume alto","diferencial":"~150W real"}]}
]};
let current='aiwa';
function renderTabs(){document.getElementById('tabs').innerHTML=data.modelos.map(m=>`<button onclick="sel('${m.id}')" class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap ${m.id===current?'tab-active':'bg-white border'}">${m.nome}</button>`).join('')}
function sel(id){current=id;renderTabs();render();window.scrollTo({top:0,behavior:'smooth'})}
function render(){const m=data.modelos.find(x=>x.id===current);document.getElementById('content').innerHTML=`<div class="card p-5 mb-4"><h2 class="text-xl font-bold mb-3">${m.nome}</h2><div class="grid grid-cols-2 sm:grid-cols-3 gap-2">${Object.entries(m.overview).map(([k,v])=>`<div class="bg-gray-50 p-3 rounded-xl"><div class="text-xs text-gray-500">${k}</div><div class="font-semibold text-sm">${v}</div></div>`).join('')}</div></div><div class="card p-5"><h3 class="font-bold mb-3">Tecnologias</h3><div class="space-y-2">${m.tecnologias.map(t=>`<div class="border rounded-xl"><button onclick="this.parentElement.classList.toggle('accordion-open')" class="w-full flex justify-between p-4 text-left"><div><div class="font-medium text-sm">${t.nome}</div><div class="text-xs text-gray-500">${t.desc}</div></div><svg class="chevron w-5 h-5 text-gray-400 transition" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6"/></svg></button><div class="accordion-content px-4"><div class="text-xs space-y-2 pb-2"><p><b class="text-green-700">Benefício:</b> ${t.beneficio}</p><p><b class="text-red-700">Diferencial:</b> ${t.diferencial}</p></div></div></div>`).join('')}</div></div>`}
document.getElementById('search').addEventListener('input',e=>{const term=e.target.value.toLowerCase();if(!term){render();return}const m=data.modelos.find(x=>x.id===current);const filt=m.tecnologias.filter(t=>t.nome.toLowerCase().includes(term)||t.desc.toLowerCase().includes(term));document.querySelector('#content .space-y-2').innerHTML=filt.map(t=>`<div class="border rounded-xl p-3"><div class="font-medium text-sm">${t.nome}</div><div class="text-xs text-gray-600">${t.desc}</div></div>`).join('')||'<p class="text-sm text-gray-500 p-4">Nenhum resultado</p>'});
renderTabs();render();
</script></body></html>
